services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DATABASE_NAME:-apppizzas}
      MYSQL_USER: ${DATABASE_USER:-app}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-app_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  realtime:
    build:
      context: ./realtime-server
    restart: unless-stopped
    environment:
      PORT: 3001
      INTERNAL_TOKEN: ${REALTIME_INTERNAL_TOKEN:-change-me-internal-token}
    ports:
      - "3001:3001"

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      realtime:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${DATABASE_USER:-app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-app_password}
      DATABASE_NAME: ${DATABASE_NAME:-apppizzas}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-please-this-must-be-at-least-32-chars}
      NEXT_PUBLIC_ADMIN_EMAIL: ${NEXT_PUBLIC_ADMIN_EMAIL:-admin@local.dev}
      NEXT_PUBLIC_REALTIME_WS_URL: ${NEXT_PUBLIC_REALTIME_WS_URL:-ws://localhost:3001}
      REALTIME_INTERNAL_URL: http://realtime:3001
      REALTIME_INTERNAL_TOKEN: ${REALTIME_INTERNAL_TOKEN:-change-me-internal-token}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-}
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:-}
    ports:
      - "3000:3000"

volumes:
  mysql_data:
